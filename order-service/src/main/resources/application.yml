  application:
    name: order-service
  datasource:
    url: jdbc:mysql://localhost:3306/msa_order_service
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  security:
    user:
      name: user
      password: $2a$10$.flXiAvnQ6V7wzzky9WFbu0NR95uwIYJtlJbSZ7/h81byzxEAWdou


eureka:
  instance:
    instanceId: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

greeting:
  message: Welcome to the Simple E-commerce.


management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

  endpoints:
    web:
      exposure:
        include:
          - health
          - httptrace
          - info
          - prometheus
          - metrics


logging:
  level:
    org.springframework.security: DEBUG
    com.github.syann97.toymsa.userservice.client: DEBUG

